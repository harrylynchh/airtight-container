name: Deploy
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/airtight-backend:latest
          # keep :latest a single linux/amd64 image; v6+ otherwise pushes an
          # attestation index that the compose-pull host doesn't need
          provenance: false

      - name: Build and push frontend
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/airtight-frontend:latest
          provenance: false
          build-args: |
            VITE_GOOGLE_MAPS_API_KEY=${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}

      - name: Deploy to EC2
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Pin the host key from a secret instead of TOFU via
          # ssh-keyscan. Without this, a one-time MITM on the runner
          # → EC2 path on any deploy hands the attacker shell on the
          # host. The secret holds only the key (e.g.
          # "ssh-ed25519 AAA...") — the hostname is concatenated from
          # EC2_HOST below so the entry always matches whatever
          # hostname the next line connects to.
          echo "${{ secrets.EC2_HOST }} ${{ secrets.EC2_SSH_HOST_KEY }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          # `docker system prune -af` FIRST: each deploy pulls fresh :latest
          # images (the backend carries Chromium, ~hundreds of MB), and the
          # superseded layers pile up until the host volume fills — which is
          # exactly what broke the #19 deploy ("no space left on device" mid
          # pull). Pruning unused images/containers before the pull frees that
          # space and keeps the host bounded. Running containers hold the
          # current images, so they're protected.
          #
          # Order matters and the && chain is the safety rail:
          #   pull new images
          #   → back up prod + apply pending migrations + validate, all in one
          #     transaction, using the NEW image (scripts/migrate.ts). If the
          #     validation callback throws, the migration ROLLS BACK and the
          #     command exits non-zero, so `up -d` below never runs and the
          #     OLD containers keep serving the unchanged schema.
          #   → only on success: bring up the new code.
          # Migrations here are additive/backward-compatible, so running them
          # before the new code deploys is safe (old code ignores new columns).
          # --user root: write the dump into the host-owned backups mount.
          # --baseline-on-empty 0023: first run adopts prod's existing 0000-0023
          #   (sentinel-guarded), then applies 0024+. A no-op once adopted.
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "cd /home/ubuntu/airtight-container \
              && docker system prune -af \
              && docker compose pull \
              && mkdir -p /home/ubuntu/airtight-backups \
              && docker compose run --rm --user root \
                   -v /home/ubuntu/airtight-backups:/backups \
                   backend node_modules/.bin/tsx scripts/migrate.ts \
                     --backup-dir /backups \
                     --baseline-on-empty 0023 \
                     --check ./scripts/migration-checks/current.ts \
              && docker compose up -d"
