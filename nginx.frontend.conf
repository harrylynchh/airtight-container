server {
    listen 8080;
    server_tokens off;
    root /usr/share/nginx/html;
    index index.html;

    # Baseline security headers. helmet() on the backend covers /api/*
    # responses; this block covers the SPA shell and static assets
    # served directly by nginx. CSP intentionally narrow — same-origin
    # everything except Google Fonts (preconnected in index.html).
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Deny dotfiles (.git, .env, .htaccess, etc.) and common backup
    # extensions. The container only has the dist/ output so this is
    # defense-in-depth rather than fixing a known exposure, but it
    # catches the failure mode where a future build accidentally ships
    # a sensitive file.
    location ~ /\.(?!well-known) {
        deny all;
        return 404;
    }
    location ~ \.(bak|backup|old|orig|swp|swo)$ {
        deny all;
        return 404;
    }

    # Block sourcemaps from being served — they'd leak original
    # source to anyone curious. Vite doesn't emit them by default
    # but this catches accidental regressions.
    location ~ \.map$ {
        deny all;
        return 404;
    }

    location /api/ {
        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri /index.html;
    }
}
